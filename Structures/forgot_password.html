<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="../structure_css/forgot_password.css">
</head>
<body>

<div class="recovery-container">

    <h2>Forgot Password</h2>
    <p class="subtitle">Recover your account in three quick steps</p>

    <!-- STEP 1: ENTER EMAIL -->
    <div id="stepEmail">
        <label>Email Address</label>
        <input type="email" id="recoveryEmailInput" placeholder="Enter your email">
        <button id="loadQuestionBtn">Find Account</button>
    </div>

    <!-- STEP 2: SECURITY QUESTION -->
    <div id="stepQuestion" style="display:none;">
        <p id="displayedPasswordQuestion" class="question-text"></p>
        <input type="text" id="passwordAnswerInput" placeholder="Your Answer">
        <button id="submitPasswordRecoveryBtn">Verify Answer</button>
    </div>

    <!-- STEP 3: RESET PASSWORD -->
    <div id="stepReset" style="display:none;">
        <label>New Password</label>
        <input type="password" id="newPasswordInput" placeholder="Enter new password">
        <button id="resetPasswordBtn">Reset Password</button>
    </div>

    <p id="passwordRecoveryMsg" class="msg-box" style="display:none;"></p>

    <a href="login.html" class="back-link">Back to Login</a>

</div>

<script src="../Structure_js/forgot_password.js"></script>
</body>
</html>
