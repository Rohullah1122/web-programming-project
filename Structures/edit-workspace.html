<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Workspace - Management</title>

    <link rel="stylesheet" href="../structure_css/owner-dashboard.css">

    <style>
        .edit-container { max-width: 650px; margin: 40px auto; padding: 20px; }
        .btn-group { display: flex; gap: 15px; margin-top: 20px; }
        .delete-btn { background-color: #ff4d4d; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; flex: 1; }
        .delete-btn:hover { background-color: #d93636; }
        .update-btn { background-color: #5d5fef; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; flex: 2; }
        .update-btn:hover { background-color: #4a4cd1; }
        .cancel-link { display: block; text-align: center; margin-top: 15px; color: #62626a; text-decoration: none; }
    </style>
</head>

<body>

    <main class="edit-container">
        <div class="management-card">
            <h2>Modify Workspace Listing</h2>
            <p>Update your workspace details or remove this listing permanently.</p>

            <form id="editWorkspaceForm">

                <!-- PROPERTY INFO -->
                <div class="form-group">
                    <label for="editName">Property/Building Name</label>
                    <input type="text" id="editName" required>
                </div>

                <div class="form-group">
                    <label for="editAddress">Street Address</label>
                    <input type="text" id="editAddress" required>
                </div>

                <div class="form-group">
                    <label for="editNeighborhood">Neighborhood / Area</label>
                    <input type="text" id="editNeighborhood" required>
                </div>

                <!-- NEW PROPERTY FIELDS -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="editSqft">Square Footage (sqft)</label>
                        <input type="number" id="editSqft" required>
                    </div>

                    <div class="form-group">
                        <label for="editGarage">Garage Available?</label>
                        <select id="editGarage" required>
                            <option value="Yes">Yes</option>
                            <option value="No">No</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="editTransport">Public Transport Access?</label>
                        <select id="editTransport" required>
                            <option value="Yes">Yes</option>
                            <option value="No">No</option>
                        </select>
                    </div>
                </div>

                <!-- IMAGES -->
                <div class="form-row">
                    <div class="form-group">
                        <label>Update Building Image (Optional)</label>
                        <label for="editBuildingImage" class="custom-file-upload" style="border: 1px dashed #dcdcdc; padding: 12px; border-radius: 8px; text-align: center; cursor: pointer; display: block; background: #fafafa;">
                            <span class="upload-icon">🏢</span>
                            <span id="buildingNamePreview">Choose a new file...</span>
                        </label>
                        <input type="file" id="editBuildingImage" accept="image/*" style="display:none;">
                    </div>

                    <div class="form-group">
                        <label>Update Workspace Image (Optional)</label>
                        <label for="editRoomImage" class="custom-file-upload" style="border: 1px dashed #dcdcdc; padding: 12px; border-radius: 8px; text-align: center; cursor: pointer; display: block; background: #fafafa;">
                            <span class="upload-icon">🛋️</span>
                            <span id="roomNamePreview">Choose a new file...</span>
                        </label>
                        <input type="file" id="editRoomImage" accept="image/*" style="display:none;">
                    </div>
                </div>

                <!-- WORKSPACE INFO -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="editType">Workspace Type</label>
                        <select id="editType">
                            <option value="Hot Desk">Hot Desk</option>
                            <option value="Private Office">Private Office</option>
                            <option value="Meeting Room">Meeting Room</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="editCapacity">Capacity (Seats)</label>
                        <input type="number" id="editCapacity" min="1" required>
                    </div>
                </div>

                <!-- NEW WORKSPACE FIELDS -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="editSmoking">Smoking Allowed?</label>
                        <select id="editSmoking" required>
                            <option value="No">No</option>
                            <option value="Yes">Yes</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="editAvailability">Availability</label>
                        <input type="date" id="editAvailability" required>
                    </div>

                    <div class="form-group">
                        <label for="editTerm">Term</label>
                        <select id="editTerm" required>
                            <option value="Daily">Daily</option>
                            <option value="Weekly">Weekly</option>
                            <option value="Monthly">Monthly</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="editPrice">Price per Hour ($)</label>
                    <input type="number" id="editPrice" min="0" required>
                </div>

                <!-- BUTTONS -->
                <div class="btn-group">
                    <button type="button" class="delete-btn" id="deleteBtn">Delete Listing</button>
                    <button type="submit" class="update-btn">Save Changes</button>
                </div>

                <a href="owner-dashboard.html" class="cancel-link">← Cancel and Go Back</a>
            </form>
        </div>
    </main>

    <script src="../Structure_js/edit-workspace.js"></script>
</body>
</html>
